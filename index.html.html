<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundTrack: The Vinyl Race</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f7eed8;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .vinyl {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    position: relative;
    background: conic-gradient(
      #f4a0be 0deg 30deg,
      #7cc8f0 30deg 60deg,
      #ffd166 60deg 90deg,
      #8ed87a 90deg 120deg,
      #c090f0 120deg 150deg,
      #f0a050 150deg 180deg,
      #f4a0be 180deg 210deg,
      #7cc8f0 210deg 240deg,
      #ffd166 240deg 270deg,
      #8ed87a 270deg 300deg,
      #c090f0 300deg 330deg,
      #f0a050 330deg 360deg
    );
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    animation: spin 6s linear infinite;
    margin: 0 auto 28px;
  }

  .vinyl::after {
    content: '';
    position: absolute;
    inset: 18%;
    border-radius: 50%;
    background: radial-gradient(circle at 48% 48%,
      #fff8ee 0%,
      #f0e4c8 35%,
      #e8d5a8 60%,
      #c4a46a 100%
    );
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.12);
  }

  .vinyl-hole {
    position: absolute;
    inset: 46%;
    border-radius: 50%;
    background: #c4a46a;
    z-index: 2;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .card {
    background: #fff8ee;
    border-radius: 20px;
    padding: 36px 28px 32px;
    max-width: 340px;
    width: 92vw;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    border: 1.5px solid #e8d5aa;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #5a3e1b;
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }

  .subtitle {
    font-size: 12px;
    color: #a0845a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .status {
    font-size: 15px;
    color: #7a5c2a;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f4a0be;
    animation: pulse 1s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .btn {
    display: inline-block;
    margin-top: 24px;
    padding: 14px 32px;
    background: #f4a0be;
    color: #5a1a2a;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(244,160,190,0.4);
  }

  .btn:active { transform: scale(0.97); }
  .btn:hover { background: #f08aaa; }

  .btn-again {
    display: none;
    margin-top: 12px;
    padding: 10px 24px;
    background: transparent;
    color: #a0845a;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    border: 1.5px solid #e8d5aa;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-again:hover { background: #f7eed8; }

  .rules {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #e8d5aa;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .rule-chip {
    font-size: 11px;
    color: #9a7c4a;
    background: #f7eed8;
    border-radius: 20px;
    padding: 5px 12px;
    border: 1px solid #e8d5aa;
  }
</style>
</head>
<body>
<div class="card">
  <div class="vinyl">
    <div class="vinyl-hole"></div>
  </div>
  <h1>QR Beat</h1>
  <p class="subtitle">SoundTrack · The Vinyl Race</p>

  <div class="status" id="status">
    Apasă pentru o melodie aleatorie
  </div>

  <button class="btn" id="btnPlay" onclick="pickSong()">▶ Trage melodia</button>
  <button class="btn-again" id="btnAgain" onclick="pickSong()">↺ Altă melodie</button>

  <div class="rules">
    <span class="rule-chip">🎵 Asculți 5-10 sec</span>
    <span class="rule-chip">🎤 Ghicești titlul = +2 tokens</span>
    <span class="rule-chip">📅 Ghicești anul = arunci din nou</span>
  </div>
</div>

<script>
  // Lista de melodii cu timestamp — adaugă/modifică după ce vrei
  // format: { url: "link YouTube cu ?t=secunde", title: "Titlu - Artist" }
  const songs = [
    { url: "https://www.youtube.com/watch?v=nfWlot6h_JM&t=41", title: "Shake It Off - Taylor Swift" },
    { url: "https://www.youtube.com/watch?v=OPf0YbXqDm0&t=55", title: "Happy - Pharrell Williams" },
    { url: "https://www.youtube.com/watch?v=kXYiU_JCYtU&t=62", title: "Numb - Linkin Park" },
    { url: "https://www.youtube.com/watch?v=hTWKbfoikeg&t=48", title: "Smells Like Teen Spirit - Nirvana" },
    { url: "https://www.youtube.com/watch?v=YqeW9_5kURI&t=30", title: "Shape of You - Ed Sheeran" },
    { url: "https://www.youtube.com/watch?v=0KSOMA3QBU0&t=44", title: "Bad Guy - Billie Eilish" },
    { url: "https://www.youtube.com/watch?v=fJ9rUzIMcZQ&t=50", title: "Bohemian Rhapsody - Queen" },
    { url: "https://www.youtube.com/watch?v=ZbZSe6N_BXs&t=38", title: "Happy - Pharrell" },
    { url: "https://www.youtube.com/watch?v=SlPhMPnQ58k&t=33", title: "Blinding Lights - The Weeknd" },
    { url: "https://www.youtube.com/watch?v=09R8_2nJtjg&t=42", title: "Sugar - Maroon 5" },
    { url: "https://www.youtube.com/watch?v=JGwWNGJdvx8&t=55", title: "Shape of You - Ed Sheeran" },
    { url: "https://www.youtube.com/watch?v=CevxZvSJLk8&t=40", title: "Roar - Katy Perry" },
    { url: "https://www.youtube.com/watch?v=RgKAFK5djSk&t=52", title: "See You Again - Wiz Khalifa" },
    { url: "https://www.youtube.com/watch?v=OPf0YbXqDm0&t=60", title: "Happy - Pharrell Williams" },
    { url: "https://www.youtube.com/watch?v=pRpeEdMmmQ0&t=44", title: "Waka Waka - Shakira" },
    { url: "https://www.youtube.com/watch?v=nfWlot6h_JM&t=58", title: "Shake It Off - Taylor Swift" },
    { url: "https://www.youtube.com/watch?v=2vjPBrBU-TM&t=35", title: "Gangnam Style - PSY" },
    { url: "https://www.youtube.com/watch?v=lp-EO5I60KA&t=47", title: "Uptown Funk - Bruno Mars" },
    { url: "https://www.youtube.com/watch?v=OPf0YbXqDm0&t=70", title: "Happy - Pharrell" },
    { url: "https://www.youtube.com/watch?v=7PCkvCPvDXk&t=39", title: "Rolling in the Deep - Adele" },
    { url: "https://www.youtube.com/watch?v=450p7goxZqg&t=51", title: "All of Me - John Legend" },
    { url: "https://www.youtube.com/watch?v=kffacxfA7G4&t=43", title: "Baby - Justin Bieber" },
    { url: "https://www.youtube.com/watch?v=e-ORhEE9VVg&t=36", title: "Treasure - Bruno Mars" },
    { url: "https://www.youtube.com/watch?v=YqeW9_5kURI&t=55", title: "Shape of You - Ed Sheeran" },
    { url: "https://www.youtube.com/watch?v=d27gTrPPAyk&t=40", title: "Hello - Adele" },
  ];

  let lastIndex = -1;

  function pickSong() {
    // alege random dar evita sa repete aceeasi melodie de doua ori la rand
    let index;
    do {
      index = Math.floor(Math.random() * songs.length);
    } while (index === lastIndex && songs.length > 1);
    lastIndex = index;

    const song = songs[index];

    // update UI
    document.getElementById('status').innerHTML =
      '<span class="dot"></span> Se deschide melodia...';
    document.getElementById('btnPlay').style.display = 'none';
    document.getElementById('btnAgain').style.display = 'inline-block';

    // redirect dupa 800ms ca sa vada animatia
    setTimeout(() => {
      window.location.href = song.url;
    }, 800);
  }
</script>
</body>
</html>
